version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: pharmacare-db
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DB_NAME:-pharmacy}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmacare-network
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=1000'

  # Valkey Cache (Redis-compatible)
  valkey:
    image: valkey/valkey:7-alpine
    container_name: pharmacare-valkey
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pharmacare-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./ph_backend
      dockerfile: Dockerfile
    container_name: pharmacare-api
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-pharmacy}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      CACHE_TTL: ${CACHE_TTL:-300}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_live_placeholder_key}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-razorpay_placeholder_secret}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ./ph_backend/src:/app/src
      - ./ph_backend/prisma:/app/prisma
    networks:
      - pharmacare-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend
  frontend:
    build:
      context: ./ph_frontend
      dockerfile: Dockerfile
    container_name: pharmacare-web
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID:-rzp_live_placeholder_key}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pharmacare-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local

networks:
  pharmacare-network:
    driver: bridge
