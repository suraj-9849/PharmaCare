name: Comprehensive CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # VALIDATION & SETUP PHASE
  # ============================================
  
  validation:
    name: System Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run validation suite
        run: node scripts/validate.js

  # ============================================
  # FRONTEND PIPELINE
  # ============================================
  
  frontend-lint:
    name: Frontend - Lint & Format
    runs-on: ubuntu-latest
    needs: [validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun cache
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        working-directory: ./ph_frontend
        run: bun run format:check

      - name: Run ESLint
        working-directory: ./ph_frontend
        run: bun run lint

  frontend-type-check:
    name: Frontend - Type Check
    runs-on: ubuntu-latest
    needs: [validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun cache
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        working-directory: ./ph_frontend
        run: bun run type-check

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-type-check]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun cache
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js application
        working-directory: ./ph_frontend
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000/api' }}

  # ============================================
  # BACKEND PIPELINE
  # ============================================
  
  backend-lint:
    name: Backend - Lint & Format
    runs-on: ubuntu-latest
    needs: [validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun cache
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        working-directory: ./ph_backend
        run: bun run format:check

      - name: Run ESLint
        working-directory: ./ph_backend
        run: bun run lint

  backend-type-check:
    name: Backend - Type Check & Build
    runs-on: ubuntu-latest
    needs: [validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun cache
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check & build
        working-directory: ./ph_backend
        run: bun run build

  backend-prisma:
    name: Backend - Prisma Validation
    runs-on: ubuntu-latest
    needs: [validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun cache
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: ./ph_backend
        run: bun run prisma:generate

      - name: Validate Prisma schema
        working-directory: ./ph_backend
        run: npx prisma validate

  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-type-check, backend-prisma]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun cache
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: ./ph_backend
        run: bun run prisma:generate

      - name: Build TypeScript
        working-directory: ./ph_backend
        run: bun run build

  # ============================================
  # PYTHON AI ASSISTANT PIPELINE
  # ============================================
  
  python-lint:
    name: Python - Lint & Format Check
    runs-on: ubuntu-latest
    needs: [validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        working-directory: ./ai_assistant
        run: python -m venv .venv

      - name: Install dependencies
        working-directory: ./ai_assistant
        run: |
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install linting tools
        working-directory: ./ai_assistant
        run: |
          .venv/bin/pip install black flake8 isort pylint

      - name: Format check with black
        working-directory: ./ai_assistant
        run: .venv/bin/black --check . || true

      - name: Lint with flake8
        working-directory: ./ai_assistant
        run: .venv/bin/flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Import sort check
        working-directory: ./ai_assistant
        run: .venv/bin/isort --check-only . || true

  python-security:
    name: Python - Security Check
    runs-on: ubuntu-latest
    needs: [validation]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run bandit security scan
        working-directory: ./ai_assistant
        run: bandit -r . -ll || true

      - name: Check for known vulnerabilities
        working-directory: ./ai_assistant
        run: pip install -r requirements.txt && safety check --json || true

  python-test:
    name: Python - Unit Tests
    runs-on: ubuntu-latest
    needs: [python-lint, python-security]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        working-directory: ./ai_assistant
        run: python -m venv .venv

      - name: Install uv
        working-directory: ./ai_assistant
        run: .venv/bin/pip install uv

      - name: Install dependencies
        working-directory: ./ai_assistant
        run: .venv/bin/uv pip install -e ".[dev]"

      - name: Run tests
        working-directory: ./ai_assistant
        run: |
          if [ -d "tests" ] || [ -f "test_*.py" ]; then
            .venv/bin/uv run pytest -v
          else
            echo "No tests found, skipping"
          fi

  # Comprehensive Validation
  validation-suite:
    name: Comprehensive Validation Suite
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, python-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun cache
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: ./ph_backend
        run: bun run prisma generate

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Sync Python dependencies with dev tools
        working-directory: ./ai_assistant
        run: uv sync --extra dev

      - name: Run comprehensive validation
        run: bun run validate

  # Final status check
  ci-success:
    name: CI/CD Pipeline Success
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, python-test, validation-suite]
    if: success()
    
    steps:
      - name: All checks passed
        run: echo "All CI/CD checks passed successfully"

  ci-failure:
    name: CI/CD Pipeline Failure
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, python-test, validation-suite]
    if: failure()
    
    steps:
      - name: Checks failed
        run: |
          echo "Some CI/CD checks failed"
          exit 1
